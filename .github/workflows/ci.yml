name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend Rust Services
  backend-rust:
    name: Backend - Rust
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - identity
          - state-engine
          - streaming
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/services/${{ matrix.service }}

      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: backend/services/${{ matrix.service }}

      - name: Run clippy
        run: cargo clippy --all --all-targets -- -D warnings
        working-directory: backend/services/${{ matrix.service }}

      - name: Run tests
        run: cargo test --all
        working-directory: backend/services/${{ matrix.service }}

      - name: Build release
        run: cargo build --release
        working-directory: backend/services/${{ matrix.service }}

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.service }}-binary
          path: backend/services/${{ matrix.service }}/target/release/${{ matrix.service }}

  # Backend Python Services
  backend-python:
    name: Backend - Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - narrative-planner
          - character-ai
          - video-generation
          - voice-engine
          - memory-engine
          - agent-orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-cov black flake8 mypy

      - name: Format check
        run: black --check backend/services/${{ matrix.service }}

      - name: Lint
        run: flake8 backend/services/${{ matrix.service }}

      - name: Type check
        run: mypy backend/services/${{ matrix.service }}

      - name: Run tests
        run: pytest backend/services/${{ matrix.service }} -v --cov

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: ${{ matrix.service }}

  # Frontend
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Test
        run: cd frontend && npm run test

      - name: Build
        run: cd frontend && npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend

  # Database Migrations
  database:
    name: Database Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cineflow
          POSTGRES_PASSWORD: cineflow_test
          POSTGRES_DB: cineflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://cineflow:cineflow_test@localhost:5432/cineflow_test
        run: |
          cd database && \
          psql $DATABASE_URL < schemas/01-core.sql && \
          psql $DATABASE_URL < schemas/02-memory-assets.sql

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker Build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-rust, backend-python, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: backend/services/api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cineflow-api-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/cineflow-api-gateway:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cineflow-api-gateway:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cineflow-api-gateway:buildcache,mode=max

  # Code Quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Generate Documentation
  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build documentation
        run: mkdocs build -d site

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: site/

  # Notify on Failure
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-rust, backend-python, frontend, database, security, quality]
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ CI Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI Pipeline Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
