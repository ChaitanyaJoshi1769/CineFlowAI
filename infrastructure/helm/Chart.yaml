apiVersion: v2
name: cineflow
description: CineFlow AI - Interactive Stateful Video Platform Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

home: https://cineflow.ai
sources:
  - https://github.com/ChaitanyaJoshi1769/CineFlowAI
maintainers:
  - name: CineFlow AI Team
    email: dev@cineflow.ai

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: elasticsearch
    version: "19.x.x"
    repository: https://helm.elastic.co
    condition: elasticsearch.enabled

  - name: prometheus
    version: "25.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled

  - name: grafana
    version: "7.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled

  - name: jaeger
    version: "0.x.x"
    repository: https://jaegertracing.github.io/helm-charts
    condition: jaeger.enabled

keywords:
  - ai
  - video
  - interactive
  - streaming
  - storytelling
  - machine-learning

annotations:
  category: Multimedia
  licenses: Apache-2.0
